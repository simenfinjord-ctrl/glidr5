name: Type check

# Runs the TypeScript compiler (tsc --noEmit) on every push and pull request.
# This catches type errors that the production build (esbuild) silently ignores —
# e.g. a component using a helper it never defined, a wrong prop type, a typo.
# It does NOT block the Render deploy; it just gives a clear ✅/❌ on each commit.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check (tsc --noEmit)
        run: npm run check

<!DOCTYPE html>
<html lang="no" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <!-- Glidr has its own NO/EN language switch. Browser auto-translation (Google
         Translate / Safari Translate) rewrites DOM text nodes and crashes React
         ("Failed to execute 'removeChild' on 'Node'" → the error boundary). Tell
         the browser not to offer/auto-translate. -->
    <meta name="google" content="notranslate" />

    <meta property="og:title" content="Glidr — Digitalt testverktøy for skismøring" />
    <meta property="og:description" content="Registrer, analyser og gjenfinne alle ski- og glidetester. Bygget for smørelag som vil vinne på fakta, ikke magefølelse." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://glidr.no" />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="nb_NO" />
    <meta property="og:site_name" content="Glidr" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@glidr_no" />
    <meta name="twitter:title" content="Glidr — Digitalt testverktøy for skismøring" />
    <meta name="twitter:description" content="Registrer, analyser og gjenfinne alle ski- og glidetester. Bygget for smørelag som vil vinne på fakta, ikke magefølelse." />
    <meta name="twitter:image" content="/opengraph.jpg" />

    <meta name="description" content="Registrer, analyser og gjenfinne alle ski- og glidetester. Bygget for smørelag som vil vinne på fakta, ikke magefølelse." />

    <!-- Favicon -->
    <link rel="icon" href="/glidr-icon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.png" type="image/png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#111111" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Glidr" />
  </head>
  <body>
    <div id="root">
      <!-- Initial loading spinner shown until React mounts (avoids a white flash,
           especially when launching the iOS home-screen shortcut). React replaces
           #root's contents on mount, removing this automatically. -->
      <style>
        @keyframes glidr-spin { to { transform: rotate(360deg); } }
        #glidr-boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #111111; }
        #glidr-boot div { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.15); border-top-color: #10b981; border-radius: 50%; animation: glidr-spin 0.8s linear infinite; }
      </style>
      <div id="glidr-boot"><div role="status" aria-label="Loading"></div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>

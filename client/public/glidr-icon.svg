<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Glidr">
  <defs>
    <!-- Brand gradient: emerald-500 → emerald-700 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <!-- Subtle inner highlight -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Inner highlight overlay -->
  <rect width="100" height="100" rx="22" fill="url(#shine)"/>

  <!--
    G lettermark
    Circle center: (50, 50)  radius: 20
    Arc: from (65, 37) CCW 280° to (65, 63) — leaves 80° opening on right
    (65,37) ≈ center + 20·(cos−40°, sin−40°) = upper-right at 2 o'clock
    (65,63) ≈ center + 20·(cos 40°, sin 40°)  = lower-right at 4 o'clock
    SVG arc: large-arc=1, sweep=0 (CCW)
  -->
  <path
    d="M65 37 A20 20 0 1 0 65 63"
    stroke="white"
    stroke-width="9.5"
    fill="none"
    stroke-linecap="round"
  />

  <!-- Crossbar: center → rightmost point (fills the G opening at mid-height) -->
  <line
    x1="50" y1="50"
    x2="70" y2="50"
    stroke="white"
    stroke-width="9.5"
    stroke-linecap="round"
  />

  <!--
    Speed tail: a short upward-right tick from the crossbar end.
    Represents glide / forward momentum — Glidr's signature mark.
  -->
  <line
    x1="70" y1="50"
    x2="79" y2="36"
    stroke="white"
    stroke-width="5"
    stroke-linecap="round"
    opacity="0.55"
  />
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" role="img" aria-label="Glidr">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@800&amp;display=swap');
    </style>
  </defs>

  <!-- ── Icon mark ── -->
  <rect width="60" height="60" rx="13" fill="url(#bg)"/>
  <rect width="60" height="60" rx="13" fill="url(#shine)"/>
  <!-- G arc: center(30,30) r=12, endpoints at ±40° → (39,22) and (39,38) -->
  <path d="M39 22 A12 12 0 1 0 39 38"
        stroke="white" stroke-width="5.8" fill="none" stroke-linecap="round"/>
  <!-- Crossbar -->
  <line x1="30" y1="30" x2="42" y2="30"
        stroke="white" stroke-width="5.8" stroke-linecap="round"/>
  <!-- Speed tail -->
  <line x1="42" y1="30" x2="47" y2="21"
        stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.55"/>

  <!-- ── Wordmark (dark — for light backgrounds) ── -->
  <text x="75" y="39"
        font-family="'Inter', system-ui, -apple-system, sans-serif"
        font-weight="800"
        font-size="31"
        letter-spacing="-0.5"
        fill="#18181b">Glidr</text>
</svg>

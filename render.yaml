services:
  - type: web
    name: glidr
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: apt-get update -qq && apt-get install -y -qq chromium fonts-liberation libappindicator3-1 libasound2 libatk-bridge2.0-0 libatk1.0-0 libcups2 libdbus-1-3 libgdk-pixbuf2.0-0 libnspr4 libnss3 libx11-xcb1 libxcomposite1 libxdamage1 libxrandr2 xdg-utils --no-install-recommends 2>/dev/null; npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: glidr-db
          property: connectionString

databases:
  - name: glidr-db
    plan: free
    region: frankfurt
    postgresMajorVersion: "16"

services:
  - type: web
    name: glidr
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install --include=dev && npm run build
    startCommand: ./node_modules/.bin/drizzle-kit push --force && npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: glidr-db
          property: connectionString

databases:
  - name: glidr-db
    plan: free
    region: frankfurt
    postgresMajorVersion: "16"

services:
  - type: web
    name: glidr
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npx --yes -p drizzle-kit@0.31.4 drizzle-kit push --force && npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: glidr-db
          property: connectionString

databases:
  - name: glidr-db
    plan: basic-256mb
    region: frankfurt
    postgresMajorVersion: "16"

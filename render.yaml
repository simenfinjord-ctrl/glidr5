services:
  - type: web
    name: glidr
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install --include=dev && npx puppeteer browsers install chrome --config puppeteer.config.cjs && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: glidr-db
          property: connectionString
      # Vision model for "Add from picture" scanning. Priority: OpenAI → Gemini → Groq.
      # FREE option (recommended): get a Gemini key at aistudio.google.com/apikey
      - key: GEMINI_API_KEY
        sync: false
      # Paid option (best quality): your OpenAI key
      - key: OPENAI_API_KEY
        sync: false
      # Free fallback, no setup needed (console.groq.com)
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: glidr-db
    plan: free
    region: frankfurt
    postgresMajorVersion: "16"
